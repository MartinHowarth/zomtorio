[technology-description]
zomtorio-swarm-melee-1=Learn to cut through a swarm: your melee attack starts killing multiple zombies per hit.
zomtorio-swarm-melee-2=Sharper swarm melee — more damage per hit — and unlocks the double-tap toggle.

[shortcut-name]
zomtorio-double-tap=Double tap (dead-dead melee kills)

[item-description]
zomtorio-corpse=Burnable as fuel. Reanimates into a zombie if left to spoil — burn it or kiln-dry it first.
zomtorio-kiln-dried-corpse=A stable, higher-density corpse fuel that never reanimates. Drying costs energy overall.

[entity-description]
zomtorio-corpse-kiln=Dries zombie corpses into a stable, non-reanimating fuel (5 corpses to 2 kiln-dried).

