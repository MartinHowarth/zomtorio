[technology-description]
zomtorio-swarm-melee-1=Learn to cut through a swarm: your melee attack starts killing multiple zombies in one hit (instead of just one), scaling with the damage dealt.
zomtorio-swarm-melee-2=Hit harder - more zombies per swing, enough to fell tougher ones - and unlock the Double Tap toggle: melee kills become dead-dead (no corpse, so no reanimation), at the cost of the corpse fuel.

[zomtorio]
night-variant-desc=A zombie quickened by the cover of night.

[shortcut-name]
zomtorio-double-tap=Double tap (dead-dead melee kills)

[item-description]
zomtorio-corpse=Burnable as fuel. Reanimates into a zombie if left to spoil - burn it or kiln-dry it first.
zomtorio-kiln-dried-corpse=A stable, higher-density corpse fuel that never reanimates. Drying costs energy overall.

[entity-description]
zomtorio-corpse-kiln=Dries zombie corpses into a stable, non-reanimating fuel (5 corpses to 2 kiln-dried).
zomtorio-zombie-pyre=An ever-burning firepit. Insert zombie corpses and it incinerates them - one every 5 seconds - so they never reanimate. Needs no power, but yields no fuel.

