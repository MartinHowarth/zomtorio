[mod-setting-description]
zomtorio-corpse-reanimation=Killed zombies drop corpses that reanimate into new zombies after a timer (via the spoilage system).
zomtorio-reanimation-minutes=How long a corpse takes to reanimate. Bakes into the item's spoil time; restart required to change.
zomtorio-pollution-cost-multiplier=Lower means each unit of pollution recruits far more (individually weak) attackers. Bakes into prototypes.
zomtorio-nest-spawn-rate=How much faster nests produce enemies than vanilla. Bakes into prototypes.
zomtorio-horde-size-multiplier=Overall multiplier on the number of zombies generated.
zomtorio-zombie-cap=Maximum number of individual (real) active zombies for CPU tuning. Overflow folds into abstract horde clusters rather than being lost.
zomtorio-building-infection=Buildings hit by the horde become infected and take damage over time.
zomtorio-infection-seconds=Time for an infected building at full health to die. Repairing it fully clears the infection.
zomtorio-player-infection=Being bitten infects the player; any net healing clears it.
zomtorio-night-speedup=How much faster zombies move at night. 1.0 means +100% (double daytime speed). Startup setting: changing it takes effect after a restart.
zomtorio-expansion-rate=How aggressively enemy bases expand and spread.
zomtorio-night-assault-multiplier=How much larger/more frequent assaults are at night.
zomtorio-swarm-events=Telegraphed massive assaults at night whose size and frequency grow with evolution.
zomtorio-swarm-intensity=Scales the spawn rate and duration of swarm events.
zomtorio-swarm-frequency=Scales how often swarm events occur.
